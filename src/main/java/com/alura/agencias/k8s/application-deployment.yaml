apiVersion: apps/v1
kind: Deployment
metadata:
  name: banking-service
  namespace: banking-service
  labels:
    app: banking-service
spec:
  replicas: 1
  selector:
    matchLabels:
      app: banking-service
  template:
    metadata:
      labels:
        app: banking-service
    spec:
      containers:
        - name: banking-service
          image: joao0212/banking-service:v6
          ports:
            - containerPort: 8080
          env:
            - name: QUARKUS_KAFKA_SERVER
              value: "confluent-operator.banking-service.svc.cluster.local"
            - name: QUARKUS_KAFKA_PORT
              value: "7778"
            - name: QUARKUS_DATASOURCE_USERNAME
              value: "joao"
            - name: QUARKUS_DATASOURCE_PASSWORD
              value: "joao"
            - name: QUARKUS_DATASOURCE_HOST
              value: "postgres"
            - name: QUARKUS_DATASOURCE_PORT
              value: "5432"

---
apiVersion: v1
kind: Service
metadata:
  name: banking-service-service
  namespace: banking-service
spec:
  selector:
    app: banking-service
  ports:
    - protocol: TCP
      port: 8080
  type: LoadBalancer
